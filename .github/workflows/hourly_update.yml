name: Hourly Energy Prediction

on:
  schedule:
  - cron: '0 * * * *'
  workflow_dispatch:


jobs:
  build_and_predict:
    runs-on: ubuntu-latest
    env:
      # Defined at Job level so ALL steps see these
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install pandas xgboost joblib requests holidays supabase scikit-learn
        pip install torch --index-url https://download.pytorch.org/whl/cpu

    - name: 🔍 Diagnostic Audit (Identify Path/Secret Errors)
      run: |
        echo "Checking Files..."
        ls -R
        echo "Checking Python Environment..."
        python -c "import os; print('Supabase URL set:', bool(os.getenv('SUPABASE_URL')))"

    - name: Run Prediction & Ingest
      run: python fetch_data.py

    - name: Check Health & Retrain
      run: python retrain_trigger.py

    - name: Archive LSTM Model
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: energy-model-assets
        path: |
          *.pth
          *.pkl
