name: Energy Demand Forecast Pipeline

on:
  schedule:
  - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:
    # Allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Run Data Ingestion # Adjust path if your script is inside the energy-forecast-app folder
      run: python energy-forecast-app/fetch_data.py

    - name: Check Model Health and Retrain
      run: python energy-forecast-app/retrain_trigger.py
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    - name: Archive Model Assets
      uses: actions/upload-artifact@v4
      with:
        name: model-assets
        path: |
          energy_lstm_model.pth
          scaler.pkl
