name: Energy Demand Forecast Pipeline

on:
  schedule:
  - cron: '0 * * * *'
  workflow_dispatch:


jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # This tells the pipeline to run all commands from the root or subfolder
    # If your scripts are in the root of the repo, remove the 'working-directory' line
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Run Data Ingestion
      # Use the relative path from the root of your repo
      run: python fetch_data.py
      # Note: If fetch_data.py is inside a folder named 'src', use: python src/fetch_data.py

    - name: Check Model Health and Retrain
      run: python retrain_trigger.py
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    - name: Archive Model Assets
      uses: actions/upload-artifact@v4
      with:
        name: model-assets
        path: |
          energy_lstm_model.pth
          scaler.pkl
